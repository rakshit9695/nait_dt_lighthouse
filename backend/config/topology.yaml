  - {from: cerbo,     to: battery,     kind: ctrl}
  - {from: plc,       to: fronius,     kind: ctrl}
  - {from: plc,       to: quattro,     kind: ctrl}
  - {from: plc,       to: generator,   kind: ctrl}
