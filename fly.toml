# Fly.io deployment for the NAIT CGI Digital Twin backend.
# Replace `app` with the unique name `flyctl launch` assigns (or pick one).

app = "nait-dt-backend"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTHONPATH = "/app"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    interval = "30s"
    timeout  = "5s"
    grace_period = "10s"
    method   = "get"
    path     = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
