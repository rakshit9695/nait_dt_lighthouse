services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -lc "pip install -r requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports: ["8000:8000"]
    environment:
      NAIT_DT_TOKEN: dev-token
  frontend:
    image: node:20
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports: ["5173:5173"]
    depends_on: [backend]
